<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        async function multiply(a,b) {
            let response = await (a*b);
            display(response);
        }

        function display(some){
            document.write("Result is:" + some);
        }
        multiply(8,10);
    </script>
</body>
</html>
